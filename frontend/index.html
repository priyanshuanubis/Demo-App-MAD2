<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Placement Portal Application V2</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  </head>
  <body class="bg-light">
    <div id="app" class="container py-4">
      <h2 class="mb-3">Placement Portal Application</h2>
      <div v-if="!token" class="row g-3">
        <div class="col-md-6">
          <div class="card"><div class="card-body">
            <h5>Login</h5>
            <input v-model="loginForm.email" class="form-control my-2" placeholder="Email">
            <input type="password" v-model="loginForm.password" class="form-control my-2" placeholder="Password">
            <button class="btn btn-primary" @click="login">Login</button>
          </div></div>
        </div>
        <div class="col-md-6">
          <div class="card"><div class="card-body">
            <h5>Quick Student Register</h5>
            <input v-model="studentForm.email" class="form-control my-2" placeholder="Email">
            <input type="password" v-model="studentForm.password" class="form-control my-2" placeholder="Password">
            <input v-model="studentForm.full_name" class="form-control my-2" placeholder="Full Name">
            <input v-model="studentForm.branch" class="form-control my-2" placeholder="Branch">
            <input v-model="studentForm.cgpa" class="form-control my-2" placeholder="CGPA">
            <input v-model="studentForm.year" class="form-control my-2" placeholder="Year">
            <button class="btn btn-success" @click="registerStudent">Register Student</button>
          </div></div>
        </div>
      </div>

      <div v-else>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="badge text-bg-dark">Logged in as {{ user.role }}</span>
          <button class="btn btn-outline-danger btn-sm" @click="logout">Logout</button>
        </div>

        <div v-if="user.role === 'admin'" class="card"><div class="card-body">
          <h5>Admin Dashboard</h5>
          <button class="btn btn-primary btn-sm" @click="loadAdmin">Refresh Stats</button>
          <pre class="mt-2">{{ adminStats }}</pre>
        </div></div>

        <div v-if="user.role === 'student'" class="card"><div class="card-body">
          <h5>Eligible Drives</h5>
          <button class="btn btn-primary btn-sm" @click="loadDrives">Load Drives</button>
          <ul class="list-group mt-2">
            <li class="list-group-item d-flex justify-content-between" v-for="drive in drives" :key="drive.drive_id">
              <span>{{ drive.company_name }} - {{ drive.job_title }} (deadline: {{ drive.deadline }})</span>
              <button class="btn btn-sm btn-success" @click="apply(drive.drive_id)">Apply</button>
            </li>
          </ul>
        </div></div>
      </div>

      <div class="mt-3 alert alert-info" v-if="message">{{ message }}</div>
    </div>

    <script>
      const { createApp } = Vue;
      const API = 'http://localhost:5000/api';
      createApp({
        data() {
          return {
            token: localStorage.getItem('token') || '',
            user: JSON.parse(localStorage.getItem('user') || 'null'),
            message: '',
            adminStats: {},
            drives: [],
            loginForm: { email: 'admin@ppa.local', password: 'admin123' },
            studentForm: { email: '', password: '', full_name: '', branch: '', cgpa: '', year: '' }
          }
        },
        methods: {
          async api(path, method='GET', body=null) {
            const res = await fetch(API + path, {
              method,
              headers: {
                'Content-Type': 'application/json',
                ...(this.token ? { Authorization: `Bearer ${this.token}` } : {})
              },
              ...(body ? { body: JSON.stringify(body) } : {})
            });
            if (!res.ok) throw await res.json();
            const contentType = res.headers.get('content-type') || '';
            return contentType.includes('application/json') ? res.json() : res.text();
          },
          async login() {
            try {
              const data = await this.api('/auth/login', 'POST', this.loginForm);
              this.token = data.access_token; this.user = data.user;
              localStorage.setItem('token', this.token);
              localStorage.setItem('user', JSON.stringify(this.user));
              this.message = 'Login successful';
            } catch (e) { this.message = e.message || 'Login failed'; }
          },
          async registerStudent() {
            try {
              await this.api('/auth/register/student', 'POST', this.studentForm);
              this.message = 'Student registered. Please login.';
            } catch (e) { this.message = e.message || 'Registration failed'; }
          },
          async loadAdmin() {
            this.adminStats = await this.api('/admin/dashboard');
          },
          async loadDrives() {
            this.drives = await this.api('/student/drives');
          },
          async apply(id) {
            await this.api(`/student/drives/${id}/apply`, 'POST');
            this.message = 'Applied successfully';
          },
          logout() {
            this.token = ''; this.user = null;
            localStorage.removeItem('token'); localStorage.removeItem('user');
          }
        }
      }).mount('#app');
    </script>
  </body>
</html>
